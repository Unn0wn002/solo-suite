# requirements-dev.lock — hash-locked CI test/build dependencies for
# solo-suite release validation. RUNTIME NEEDS NOTHING beyond the
# Python standard library; everything here is optional CI/test tooling.
#
# Install (CI does exactly this — hashes are verified fail-closed):
#     python -m pip install --require-hashes -r requirements-dev.lock
#
# Top-level pins match ci-requirements.txt (jsonschema 4.23.0,
# coverage 7.6.1, PyYAML 6.0.2); this lock adds the FULL transitive
# closure for Python >= 3.9 (attrs, jsonschema-specifications,
# referencing, rpds-py, typing-extensions, tomli) with per-artifact
# sha256 hashes, so `--require-hashes` can verify every wheel/sdist pip
# selects on the CI matrix (ubuntu/windows × CPython 3.9/3.12) and on
# macOS dev machines.
#
# PROVENANCE OF THE HASH SETS: this lock was assembled in an offline
# validation environment (PyPI unreachable), so the per-artifact hash
# sets were cross-checked across independently published pip-compile/uv
# --generate-hashes lockfiles from unrelated organizations
# (boto/botocore requirements-dev-lock.txt, awslabs/mcp
# semgrep-requirements.txt, CERT-Polska/n6 N6SDK/requirements-dev.txt,
# googleapis/proto-breaking-change-detector requirements-dev.txt,
# mozilla/mozregression requirements/*, winpython changelogs) — at least
# two independent sources agree on every set below except
# typing-extensions (botocore only). pip verifies every hash against the
# artifact bytes at install time, fail-closed: a wrong pin can only
# break the install, never smuggle code that does not match the digest.
# Regenerate with network access via:
#     pip-compile --generate-hashes --output-file=requirements-dev.lock \
#         ci-requirements.txt
